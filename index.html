<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>BryanEthernet Browser</title>
  <link rel="icon" href="favicon.ico">
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #topbar {
      background: #1a1a1a;
      padding: 12px;
      display: flex;
      gap: 10px;
    }
    #url {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      font-size: 15px;
    }
    button {
      padding: 10px 16px;
      background: #2a2a2a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #444; }
    #view {
      height: calc(100vh - 60px);
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .errorPage, .loading, .info {
      text-align: center;
      padding: 80px 20px;
    }
    .robot { font-size: 90px; margin-bottom: 20px; }
    h2.info { color: #aaa; }
  </style>
</head>
<body>

<div id="topbar">
  <input id="url" placeholder="Digite um site .onion (ex: discord.onion)" autofocus>
  <button onclick="openSite()">Abrir</button>
</div>

<div id="view"></div>

<script>
const blockedSites = [
  "instagram.onion", "youtube.onion", "tiktok.onion", "kwai.onion",
  "bilibili.onion", "netflix.onion", "matrix.onion", "web.whatsapp.onion",
  "angiru.com.onion"
];

function cleanInput(input) {
  let u = input.trim().toLowerCase();
  u = u.replace(/^https?:\/\//, '').replace(/^www\./, '');
  return u;
}

function convertOnion(clean) {
  if (clean === "chattingjaponese.onion") return "https://windowsgreen55-stack.github.io/-j-a-p-o-n-e-s-e-/";
  if (clean === "discord.onion") return "https://discord.com/app";
  if (clean === "stoat.onion") return "https://stoat.com";
  if (clean.includes("base44")) return "https://" + clean.replace(".onion", ".app");
  return "https://" + clean.replace(".onion", ".com");
}

function slowDelay() {
  return new Promise(r => setTimeout(r, 2000 + Math.random() * 3000));
}

function showError(site) {
  document.getElementById("view").innerHTML = `
    <div class="errorPage">
      <div class="robot">🤖</div>
      <h1>BryanEthernet bloqueou este site</h1>
      <p>O site <b>${site}</b> é considerado uma rede social proibida.</p>
    </div>`;
}

function showLoading() {
  document.getElementById("view").innerHTML = `
    <div class="loading">
      <h2>Conectando na rede BryanEthernet... (pode demorar alguns segundos)</h2>
    </div>`;
}

function showMessage(msg) {
  document.getElementById("view").innerHTML = `<div class="info"><h2>${msg}</h2></div>`;
}

async function openSite() {
  const input = document.getElementById("url").value.trim();
  if (!input) {
    showMessage("Digite um endereço .onion");
    return;
  }

  if (!input.toLowerCase().endsWith(".onion")) {
    showMessage("Este navegador só aceita domínios .onion");
    return;
  }

  const clean = cleanInput(input);

  if (blockedSites.includes(clean)) {
    showError(clean);
    return;
  }

  console.log("[BryanEthernet] Resolving onion address...");
  console.log("[BryanEthernet] Connecting nodes...");
  console.log("[BryanEthernet] Loading resources for:", clean);

  showLoading();
  await slowDelay();

  const targetUrl = convertOnion(clean);

  const iframe = document.createElement("iframe");
  iframe.src = targetUrl;
  iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation allow-modals allow-storage-access-by-user-activation";

  document.getElementById("view").innerHTML = "";
  document.getElementById("view").appendChild(iframe);

  // Se der erro no iframe (muito comum), mostra aviso
  iframe.onerror = () => {
    showMessage("Falha ao carregar o site.<br>Muitos sites bloqueiam exibição em iframe por segurança (X-Frame-Options ou CSP).");
  };
}

document.getElementById("url").addEventListener("keypress", e => {
  if (e.key === "Enter") openSite();
});
</script>

</body>
</html>
